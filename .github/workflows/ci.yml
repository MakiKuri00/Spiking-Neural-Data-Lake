name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  stdlib-self-checks:
    name: stdlib self-checks (zero deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run every pure-stdlib script's assert-based self-check
        run: |
          set -e
          for f in spiking_storage_prototype test_prototype snn_classifier \
                   snn_moe_classifier temporal_coding_storage spike_telemetry_hub \
                   paradigm_b_matcher paradigm_b_engine spike_preprocessing \
                   spike_knowledge_graph spike_knowledge_graph_rotate spike_kg_relations \
                   nmnist_ingest make_results_plot; do
            echo "::group::$f"
            python "$f.py"
            echo "::endgroup::"
          done
          echo "All stdlib self-checks passed."
